name: SDK Release with Provenance

# Builds the Python and TypeScript SDKs from source, produces the publishable
# artifacts, and attaches SLSA-level build provenance using the official
# slsa-framework reusable workflows. This is the release gate: PyPI and npm
# publication runs against the artifacts attested here, NOT against arbitrary
# developer-machine builds.
#
# Triggers manually (workflow_dispatch) on a tag. The actual `pypi publish` and
# `npm publish` steps require maintainer 2FA and are run in a follow-on workflow
# that consumes the attested artifacts. This split keeps the build-provenance
# pipeline auditable without coupling it to the credentialed publication step.

on:
  workflow_dispatch:
    inputs:
      sdk:
        description: 'Which SDK to build'
        required: true
        type: choice
        options: [python, typescript, both]
      version:
        description: 'Version being built (e.g. 1.1.1rc0 or 1.1.1-pre.0)'
        required: true
  push:
    tags:
      - 'py-v*'
      - 'ts-v*'

permissions:
  contents: read
  id-token: write  # required for SLSA provenance via OIDC
  attestations: write

jobs:
  build-python:
    if: ${{ inputs.sdk == 'python' || inputs.sdk == 'both' || startsWith(github.ref, 'refs/tags/py-v') }}
    name: Build Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install build==1.2.1

      - name: Build sdist + wheel
        working-directory: sdks/python
        run: |
          python -m build
          ls -la dist/

      - name: Compute SHA-256 of artifacts
        id: hash
        working-directory: sdks/python
        run: |
          cd dist
          sha256sum * > ../SHASUMS.txt
          cd ..
          cat SHASUMS.txt
          DIGEST=$(base64 -w0 SHASUMS.txt)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-${{ github.sha }}
          path: |
            sdks/python/dist/*
            sdks/python/SHASUMS.txt

  provenance-python:
    if: ${{ inputs.sdk == 'python' || inputs.sdk == 'both' || startsWith(github.ref, 'refs/tags/py-v') }}
    needs: build-python
    permissions:
      id-token: write
      contents: read
      attestations: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build-python.outputs.digest }}"
      upload-assets: false

  build-typescript:
    if: ${{ inputs.sdk == 'typescript' || inputs.sdk == 'both' || startsWith(github.ref, 'refs/tags/ts-v') }}
    name: Build TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install (pinned via package-lock; @noble/* exact-pinned in package.json)
        working-directory: sdks/typescript
        run: npm ci

      - name: Build
        working-directory: sdks/typescript
        run: npm run build

      - name: Pack
        working-directory: sdks/typescript
        run: npm pack

      - name: Compute SHA-256 of tarball
        id: hash
        working-directory: sdks/typescript
        run: |
          sha256sum *.tgz > SHASUMS.txt
          cat SHASUMS.txt
          DIGEST=$(base64 -w0 SHASUMS.txt)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Upload built tarball
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-${{ github.sha }}
          path: |
            sdks/typescript/*.tgz
            sdks/typescript/SHASUMS.txt

  provenance-typescript:
    if: ${{ inputs.sdk == 'typescript' || inputs.sdk == 'both' || startsWith(github.ref, 'refs/tags/ts-v') }}
    needs: build-typescript
    permissions:
      id-token: write
      contents: read
      attestations: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build-typescript.outputs.digest }}"
      upload-assets: false
