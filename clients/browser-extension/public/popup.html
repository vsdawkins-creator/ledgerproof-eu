<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <title>LedgerProof Verifier</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      color: light-dark(#1a1a1a, #e5e7eb);
      background: light-dark(#fff, #1a1a1a);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      background: light-dark(#dcfce7, #14532d);
      color: light-dark(#166534, #bbf7d0);
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 500;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid light-dark(#d1d5db, #4b5563);
      border-radius: 4px;
      background: light-dark(#fff, #111827);
      color: inherit;
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
    button {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #1d4ed8;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #1e40af; }
    #result {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      background: light-dark(#f3f4f6, #1f2937);
      font-family: ui-monospace, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 1em;
    }
    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: light-dark(#6b7280, #9ca3af);
      text-align: center;
    }
    .footer a { color: inherit; }
  </style>
</head>
<body>
  <h1>LedgerProof <span class="badge">v1.0</span></h1>
  <p style="margin: 4px 0 0; color: light-dark(#6b7280, #9ca3af);">
    EU AI Act Article 50 receipt verifier.
  </p>

  <label for="seq">Verify by sequence:</label>
  <input id="seq" type="number" placeholder="e.g., 42" min="0" />
  <button id="verifyBtn">Verify</button>

  <div id="result"></div>

  <div class="footer">
    <a href="https://ledgerproofhq.io" target="_blank" rel="noopener">ledgerproofhq.io</a>
    &nbsp;·&nbsp;
    <a href="https://docs.ledgerproofhq.io" target="_blank" rel="noopener">Docs</a>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
